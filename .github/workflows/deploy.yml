name: 🚀 Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ─── Build & Lint ────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env from secrets
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env
          echo "VITE_BOT_USERNAME=${{ secrets.VITE_BOT_USERNAME }}" >> .env
          echo "VITE_OPENROUTER_BASE_URL=${{ secrets.VITE_OPENROUTER_BASE_URL }}" >> .env
          echo "VITE_OPENROUTER_DEFAULT_MODEL=${{ secrets.VITE_OPENROUTER_DEFAULT_MODEL }}" >> .env
          echo "VITE_ENV=production" >> .env
          echo "VITE_APP_BASE_URL=${{ secrets.VITE_APP_BASE_URL }}" >> .env
          echo "VITE_BOT_PUBLIC_CHANNEL=${{ secrets.VITE_BOT_PUBLIC_CHANNEL }}" >> .env
          echo "VITE_OPENROUTER_KEYS_URL=${{ secrets.VITE_OPENROUTER_KEYS_URL }}" >> .env
          echo "VITE_BASE_PATH=/${{ github.event.repository.name }}/" >> .env

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  # ─── Deploy (only on push to main) ───────────────────────────────────────────
  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
